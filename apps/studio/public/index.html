<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAgent Studio — The Authoring Desk</title>
    <script>
      // Pre-paint theme resolution — reads localStorage + prefers-color-scheme
      // before CSS is applied, so day-mode users don't see a night-mode flash.
      (function () {
        try {
          var t = localStorage.getItem('studio-theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'day' : 'night';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <link rel="preload" as="font" type="font/woff2" href="static/fonts/fraunces-latin.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="static/fonts/plex-mono-500-latin.woff2" crossorigin />
    <link rel="stylesheet" href="static/styles.css" />
  </head>
  <body>
    <header class="masthead">
      <div class="masthead-rule" aria-hidden="true"></div>
      <div class="masthead-row">
        <div class="masthead-title-wrap">
          <h1 class="masthead-title"><span class="masthead-ornament">¶</span>OpenAgent Studio</h1>
          <p class="masthead-sub">The Authoring Desk · Vol. II</p>
        </div>
        <div class="masthead-meta">
          <p class="masthead-date" id="masthead-date">— · — — · —</p>
          <p class="masthead-status">LAN · NO AUTH · LOCAL ONLY</p>
          <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch edition">
            <span class="theme-toggle-glyph" aria-hidden="true">☾</span>
            <span class="theme-toggle-label">Night edition</span>
          </button>
        </div>
      </div>
      <nav id="nav" class="masthead-nav" aria-label="Primary">
        <button type="button" data-view="dashboard" class="active">Dashboard</button>
        <button type="button" data-view="editor" disabled>Editor</button>
        <span class="masthead-nav-spacer" aria-hidden="true"></span>
        <span class="masthead-colophon">Composed nightly · paste-driven · no LLM in the loop</span>
      </nav>
      <div class="masthead-rule" aria-hidden="true"></div>
    </header>

    <main id="app"></main>

    <div id="toast-stack" aria-live="polite"></div>

    <script type="module" src="static/main.js"></script>
  </body>
</html>
