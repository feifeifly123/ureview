name = "openagent-review-author"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[vars]
SITE_NAME = "openagent.review"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "openagent-review-data"

[[routes]]
pattern = "author.openagent.review"
custom_domain = true

# In production, set MAGIC_LINK_SECRET via:
#   wrangler secret put MAGIC_LINK_SECRET
